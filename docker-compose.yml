version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: demo
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./BE/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - demo-net

  backend:
    build: ./BE
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: demo
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - demo-net

  frontend:
    build: ./FE
    ports:
      - "5174:80"
    depends_on:
      - backend
    networks:
      - demo-net

volumes:
  db-data:

networks:
  demo-net:
    driver: bridge
